[pytest]
testpaths = pico_vllm/tests
addopts = -ra
markers =
    env: environment and dependency detection tests
    cpu: tests that run on CPU-only machines
    cuda: tests that require at least one CUDA device
    min_gpus(n): tests that require at least n CUDA devices
    weights: tests that require the local ./weights directory
    ops: operator precision and correctness tests
    single_card: single-card model or engine tests
    single_node_multi_card: single-machine multi-GPU tests
    multi_card: multi-card model or system tests
    slow: slow integration tests that are not part of the default local CI gate
